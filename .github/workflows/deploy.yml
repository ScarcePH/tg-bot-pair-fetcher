name: Deploy to Cloud Run (Docker)

on:
  push:
    branches:
      - test-gh-action-postgres-requestdriven

env:
  SERVICE_NAME: tg-bot-pair-fetcher
  REGION: ${{ secrets.REGION }}
  PROJECT_ID: ${{ secrets.PROJECT_ID }}
  IMAGE: ${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.PROJECT_ID }}/scarce/tg-bot-pair-fetcher:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build Docker image
        run: docker build --tag "$IMAGE" .

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

      - name: Assert deployed image
        run: |
          deployed_image="$(gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --format='value(spec.template.spec.containers[0].image)')"

          echo "Expected: $IMAGE"
          echo "Deployed: $deployed_image"
          test "$deployed_image" = "$IMAGE"
